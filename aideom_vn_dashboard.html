function navigate(id){

function switchTab(page, tabId, btn){
  document.querySelectorAll(`#${page}-tab-${tabId}`).forEach(()=>{});
  const allTabs=btn.parentElement.querySelectorAll('.tab');
  allTabs.forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const prefix=`${page}-tab-`;
  document.querySelectorAll(`[id^="${prefix}"]`).forEach(el=>{
    el.classList.toggle('active', el.id===`${prefix}${tabId}`);
  });
  setTimeout(()=>initTabCharts(page, tabId),50);
}

function initTabCharts(page, tab){
  if(page==='b1'&&tab==='tfp') initB1TFP();

const YEARS=[2020,2021,2022,2023,2024,2025];
const GDP=[8044,8487,9513,10221,11511,12847];
const K=[16500,17800,19600,21300,23500,25900];
const L=[53.6,50.5,51.7,52.4,52.9,53.4];
const D=[12,12.7,14.3,16.5,18.3,19.5];
const AI=[55.6,60.2,65.4,67,73.8,80.1];
const H=[24.1,26.1,26.2,27,28.4,29.2];

function calcTFP(alpha,beta,gamma,delta,theta){
  return GDP.map((y,i)=>y/(Math.pow(K[i],alpha)*Math.pow(L[i],beta)*Math.pow(D[i],gamma)*Math.pow(AI[i],delta)*Math.pow(H[i],theta)));
}

function getB1Params(){
  const alpha=parseFloat((document.getElementById('b1-a')?.value||31))/100;
  const beta=parseFloat((document.getElementById('b1-b')?.value||42))/100;
  const gamma=parseFloat((document.getElementById('b1-g')?.value||10))/100;
  const delta=parseFloat((document.getElementById('b1-d')?.value||8))/100;
  const theta=Math.max(0,1-alpha-beta-gamma-delta);
  return{alpha,beta,gamma,delta,theta};
}

function updateB1(){
  const p=getB1Params();
  document.getElementById('b1-a-out').textContent=p.alpha.toFixed(2);
  document.getElementById('b1-b-out').textContent=p.beta.toFixed(2);
  document.getElementById('b1-g-out').textContent=p.gamma.toFixed(2);
  document.getElementById('b1-d-out').textContent=p.delta.toFixed(2);
  document.getElementById('b1-theta').textContent=p.theta.toFixed(2);
  const A=calcTFP(p.alpha,p.beta,p.gamma,p.delta,p.theta);
  const Amean=A.reduce((a,b)=>a+b,0)/A.length;
  const Yhat=GDP.map((_,i)=>Amean*Math.pow(K[i],p.alpha)*Math.pow(L[i],p.beta)*Math.pow(D[i],p.gamma)*Math.pow(AI[i],p.delta)*Math.pow(H[i],p.theta));
  const mape=GDP.map((y,i)=>Math.abs((y-Yhat[i])/y)).reduce((a,b)=>a+b,0)/6*100;
  document.getElementById('b1-mape').textContent=mape.toFixed(2)+'%';
  document.getElementById('b1-tfp').textContent=Amean.toFixed(2);
  const gdp30=Amean*(1+0.012*5)*Math.pow(25900*Math.pow(1.06,5),p.alpha)*Math.pow(53.4*Math.pow(1.01,5),p.beta)*Math.pow(30,p.gamma)*Math.pow(100,p.delta)*Math.pow(35,p.theta);
  document.getElementById('b1-gdp30').textContent=(gdp30).toFixed(0);
  initB1TFP();
}

function initB1TFP(){
  const p=getB1Params();
  const A=calcTFP(p.alpha,p.beta,p.gamma,p.delta,p.theta);
  mkChart('b1-tfp-chart',{type:'line',data:{labels:YEARS,datasets:[{label:'TFP A_t',data:A.map(v=>+v.toFixed(4)),borderColor:'#58a6ff',backgroundColor:'#58a6ff22',tension:.3,fill:true,pointRadius:5}]},options:{...CHART_DEFAULTS,plugins:{legend:{display:false}}}});
}

function initB1MAPE(){
  const p=getB1Params();
  const A=calcTFP(p.alpha,p.beta,p.gamma,p.delta,p.theta);
  const Amean=A.reduce((a,b)=>a+b,0)/A.length;
  const Yhat=GDP.map((_,i)=>+(Amean*Math.pow(K[i],p.alpha)*Math.pow(L[i],p.beta)*Math.pow(D[i],p.gamma)*Math.pow(AI[i],p.delta)*Math.pow(H[i],p.theta)).toFixed(1));
  mkChart('b1-mape-chart',{type:'line',data:{labels:YEARS,datasets:[{label:'Thực tế',data:GDP,borderColor:'#58a6ff',tension:.3,pointRadius:5},{label:'Dự báo',data:Yhat,borderColor:'#f78166',borderDash:[6,3],tension:.3,pointRadius:5}]},options:{...CHART_DEFAULTS,plugins:{legend:{display:true,labels:{color:'#8b949e',font:{size:10}}}}}});
}

function initB1Growth(){
  const p=getB1Params();
  const A=calcTFP(p.alpha,p.beta,p.gamma,p.delta,p.theta);
  const dlnY=GDP.slice(1).map((y,i)=>Math.log(y/GDP[i]));
  const dlnA=A.slice(1).map((a,i)=>Math.log(a/A[i]));
  const dlnK=K.slice(1).map((k,i)=>Math.log(k/K[i]));
  const dlnL=L.slice(1).map((l,i)=>Math.log(l/L[i]));
  const dlnD=D.slice(1).map((d,i)=>Math.log(d/D[i]));
  const dlnAI=AI.slice(1).map((a,i)=>Math.log(a/AI[i]));
  const dlnH=H.slice(1).map((h,i)=>Math.log(h/H[i]));
  const avg=arr=>arr.reduce((a,b)=>a+b,0)/arr.length;
  const avgY=avg(dlnY);
  const contribs={TFP:avg(dlnA),K:p.alpha*avg(dlnK),L:p.beta*avg(dlnL),D:p.gamma*avg(dlnD),AI:p.delta*avg(dlnAI),H:p.theta*avg(dlnH)};
  const pcts=Object.fromEntries(Object.entries(contribs).map(([k,v])=>[k,(v/avgY*100).toFixed(1)]));
  const barsHTML=Object.entries(pcts).map(([k,v])=>`<div class="rank-bar"><div class="rank-label">${k}</div><div class="rank-fill" style="width:${Math.max(2,parseFloat(v))}%;background:${k==='TFP'?'#3fb950':k==='K'?'#58a6ff':k==='L'?'#6e7681':'#f78166'}"></div><div class="rank-score">${v}%</div></div>`).join('');
  const el=document.getElementById('b1-growth-bars');
  if(el)el.innerHTML=barsHTML;
  mkChart('b1-growth-chart',{type:'bar',data:{labels:Object.keys(contribs),datasets:[{data:Object.values(pcts).map(Number),backgroundColor:['#3fb950','#58a6ff','#6e7681','#e3b341','#f78166','#d2a8ff']}]},options:{...CHART_DEFAULTS,plugins:{legend:{display:false}}}});
}

function updateB3(){

  document.getElementById('b3-a6o').textContent=(a6/100).toFixed(2);
  document.getElementById('b3-a7o').textContent=(a7/100).toFixed(2);
  const raw=[3.27,9.64,7.45,-1.2,7.1,7.36,9.93,7.85,6.42,6.85];
  const spill=[.35,.78,.42,.3,.55,.85,.72,.92,.65,.6];
  const air=[15,55,20,30,48,72,42,88,38,45];
  const risk=[18,42,25,55,38,52,35,28,22,18];
  const names=['Nông-TS','CN chế biến','Xây dựng','Khai khoáng','Bán lẻ','Tài chính','Logistics','CNTT','Giáo dục','Y tế'];
  const norm=(arr)=>{const mn=Math.min(...arr),mx=Math.max(...arr);return arr.map(v=>(v-mn)/(mx-mn||1));};
  const normBad=(arr)=>{const mn=Math.min(...arr),mx=Math.max(...arr);return arr.map(v=>(mx-v)/(mx-mn||1));};
  const ng=norm(raw),ns=norm(spill),na=norm(air),nr=normBad(risk);
  const w1=a1/100,w3=a3/100,w6=a6/100,w7=a7/100;
  const rem=1-w1-w3-w6-w7;
  const scores=names.map((_,i)=>+(w1*ng[i]+w3*ns[i]+w6*na[i]-w7*nr[i]+rem*0.3).toFixed(4));
  const sorted=names.map((n,i)=>({n,v:scores[i]})).sort((a,b)=>b.v-a.v);
  const el=document.getElementById('b3-bars');
  if(el)el.innerHTML=sorted.map((x,i)=>`<div class="rank-bar"><div class="rank-label">${x.n}</div><div class="rank-fill" style="width:${Math.max(2,(x.v/sorted[0].v*100)).toFixed(0)}%;background:${i<3?'#f78166':'#58a6ff'}"></div><div class="rank-score">${x.v.toFixed(3)}</div></div>`).join('');
}

function updateB7(){
  const w1=parseInt(document.getElementById('b7-w1')?.value||40)/100;

  const w3=parseInt(document.getElementById('b7-w3')?.value||20)/100;

  const f1=+(55000+w1*8000).toFixed(0);
  const f2=+(4.5-w2*5).toFixed(3);
  const f3=+(0.5-w3*0.2).toFixed(3);
  document.getElementById('b7-f1').textContent=f1.toLocaleString();
  document.getElementById('b7-f2').textContent=f2;
  document.getElementById('b7-f3').textContent=f3;
  const n=40;
  const pts=Array.from({length:n},(_,i)=>{
    const t=i/n;
    return{x:+(45000+t*25000+Math.random()*3000).toFixed(0),y:+(2+t*6+Math.random()*1.5).toFixed(2)};
  });
  const best={x:f1,y:Math.max(0.5,f2)};
  mkChart('b7-chart',{type:'scatter',data:{datasets:[{label:'Pareto front',data:pts,backgroundColor:'#58a6ff55',pointRadius:5},{label:'Thỏa hiệp',data:[best],backgroundColor:'#f78166',pointRadius:10,pointStyle:'star'}]},options:{...CHART_DEFAULTS,plugins:{legend:{display:true,labels:{color:'#8b949e',font:{size:9}}}},scales:{x:{title:{display:true,text:'f₁ GDP gain (tỷ)',color:'#6e7681',font:{size:9}},grid:{color:'#21262d'},ticks:{color:'#6e7681',font:{size:9}}},y:{title:{display:true,text:'f₂ Bất bình đẳng',color:'#6e7681',font:{size:9}},grid:{color:'#21262d'},ticks:{color:'#6e7681',font:{size:9}}}}}});
}

function updateB8(){
  const rho=parseInt(document.getElementById('b8-r')?.value||97)/100;
  const pct=parseInt(document.getElementById('b8-p')?.value||35);
  const shock=parseInt(document.getElementById('b8-s')?.value||0)/100;
  document.getElementById('b8-ro').textContent=rho.toFixed(2);
  document.getElementById('b8-po').textContent=pct;
  document.getElementById('b8-so').textContent=(shock*100).toFixed(0);
  const years=Array.from({length:10},(_,i)=>2026+i);
  let K0=27500,A0=35,D0=20.3,AI0=86,H0=30,L0=53.9;
  const gdp=[],hh=[];
  let welfare=0;
  for(let t=0;t<10;t++){
    const Y=A0*Math.pow(K0,.31)*Math.pow(L0,.42)*Math.pow(Math.max(D0,.1),.10)*Math.pow(Math.max(AI0,.1),.08)*Math.pow(Math.max(H0,.1),.09);
    const Ysh=t===2?(Y*(1-shock)):Y;
    gdp.push(+Ysh.toFixed(0)); hh.push(+H0.toFixed(2));
    welfare+=Math.pow(rho,t)*Math.log(Math.max(1,Ysh*(1-pct/100)));
    K0=.95*K0+Ysh*.33*pct/100;
    D0+=Ysh*.10*pct/100/500;
    AI0=.85*AI0+Ysh*.08*pct/100/80;
    H0=H0+.8*Ysh*.09*pct/100/600-.02*H0;
    A0*=(1+.003*D0+.002*AI0+.004*H0);
    L0*=1.008;
  }
  document.getElementById('b8-w').textContent=welfare.toFixed(2);
  document.getElementById('b8-g').textContent=(gdp[9]/1000).toFixed(1)+'k';
  document.getElementById('b8-k').textContent=(K0/1000).toFixed(1)+'k';
  mkChart('b8-chart',{type:'line',data:{labels:years,datasets:[{label:'GDP',data:gdp,borderColor:'#58a6ff',tension:.3,pointRadius:3,yAxisID:'y'},{label:'H (%)',data:hh,borderColor:'#3fb950',tension:.3,pointRadius:3,borderDash:[4,2],yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#8b949e',font:{size:9}}}},scales:{x:{grid:{color:'#21262d'},ticks:{color:'#6e7681',font:{size:9}}},y:{grid:{color:'#21262d'},ticks:{color:'#6e7681',font:{size:9}}},y1:{position:'right',grid:{display:false},ticks:{color:'#3fb950',font:{size:9}}}}}});
}

function updateB9(){

  document.getElementById('b9-bo').textContent=B.toLocaleString();

  const A1=[8.5,32.5,12.8,22.4,45.8,28.5,62.5,18.5];
  const C1=[5.2,62.4,18.5,48.2,72.5,42.8,32.5,12.5];
  const RISK=[.18,.42,.25,.38,.52,.35,.28,.22];
  const B1=[45,28,35,32,22,30,20,55];
  const names=['Nông-TS','CN CB','Xây dựng','Bán lẻ','Tài chính','Logistics','CNTT','Giáo dục'];
  const xai=B/8*.55, xh=B/8*.45;
  const nj=names.map((_,i)=>{

  });
  const total=nj.reduce((a,b)=>a+b,0);
  const neg=nj.filter(v=>v<0).length;

}

function updateB11(){
  const ep=parseInt(document.getElementById('b11-e')?.value||5000);
  const al=parseInt(document.getElementById('b11-a')?.value||10)/100;
  const ga=parseInt(document.getElementById('b11-g')?.value||95)/100;
  document.getElementById('b11-eo').textContent=ep.toLocaleString();
  document.getElementById('b11-ao').textContent=al.toFixed(2);
  document.getElementById('b11-go').textContent=ga.toFixed(2);
  const rpi=+(0.25+ga*.15+al*.05+ep/80000).toFixed(3);
  const ra1=+(rpi*.8).toFixed(3);
  const ra3=+(rpi*.69).toFixed(3);
  const rrnd=+(rpi*.53).toFixed(3);
  document.getElementById('b11-rpi').textContent=rpi;
  document.getElementById('b11-ra1').textContent=ra1;
  document.getElementById('b11-ra3').textContent=ra3;
  document.getElementById('b11-rrnd').textContent=rrnd;
  const n=Math.min(200,ep/25);
  const raw=Array.from({length:n},(_,i)=>+(rpi*(1-Math.exp(-i/n*3))-0.3+Math.random()*.1).toFixed(4));
  const smoothed=raw.map((_,i)=>i<10?raw[i]:+(raw.slice(Math.max(0,i-10),i+1).reduce((a,b)=>a+b,0)/(Math.min(i+1,11))).toFixed(4));
  mkChart('b11-chart',{type:'line',data:{labels:Array.from({length:n},(_,i)=>i*25),datasets:[{data:raw,borderColor:'#30363d',borderWidth:.8,pointRadius:0,label:'Raw'},{data:smoothed,borderColor:'#58a6ff',borderWidth:2,pointRadius:0,label:'Smoothed'}]},options:{...CHART_DEFAULTS,plugins:{legend:{display:false}}}});
}

const B12_SCENARIOS=[
  {name:'S1 Truyền thống',K:.7,D:.1,AI:.1,H:.1,color:'#6e7681'},
  {name:'S2 Số hóa nhanh',K:.25,D:.45,AI:.15,H:.15,color:'#58a6ff'},
  {name:'S3 AI dẫn dắt',K:.2,D:.2,AI:.45,H:.15,color:'#f78166'},
  {name:'S4 Bao trùm số',K:.3,D:.2,AI:.1,H:.4,color:'#3fb950'},
  {name:'S5 Tối ưu cân bằng',K:.33,D:.27,AI:.2,H:.2,color:'#e3b341'},
];

function simScenario(sc,B){
  let K0=27500,D0=20.3,AI0=86,H0=30,L0=53.9,A0=35;
  const gdp=[];
  for(let t=0;t<5;t++){
    const Y=A0*Math.pow(K0,.31)*Math.pow(L0,.42)*Math.pow(Math.max(D0,.1),.10)*Math.pow(Math.max(AI0,.1),.08)*Math.pow(Math.max(H0,.1),.09);
    gdp.push(Y);
    const bt=B/5;
    K0=.95*K0+sc.K*bt; D0+=sc.D*bt/500; AI0=.85*AI0+sc.AI*bt/80;
    H0+=.8*sc.H*bt/600-.02*H0; A0*=(1+.003*D0+.002*AI0+.004*H0); L0*=1.01;
  }
  const gr=((gdp[4]/gdp[0])**(1/4)-1)*100;
  const emis=sc.K*.4+sc.AI*.6;
  const cr=sc.AI*.7-sc.H*.3;
  const inc=sc.H*.5+sc.D*.3+(1-sc.AI)*.2;
  const nj=sc.AI*400+sc.H*300-sc.AI*sc.K*100;
  const score=.3*(Math.min(gr,12)/12)+.2*(Math.min(nj,600)/600)+.2*(1-Math.max(0,emis))+.15*Math.max(0,inc)+.15*(1-Math.max(0,cr));
  return{gdp,gr:+gr.toFixed(1),score:+Math.min(1,Math.max(0,score)).toFixed(3),cr:+cr.toFixed(3),inc:+inc.toFixed(3),nj:Math.round(nj),emis:+emis.toFixed(3)};
}

function updateB12(){
  const sc=parseInt(document.getElementById('b12-sc')?.value||2);
  const B=parseInt(document.getElementById('b12-b')?.value||50000);
  document.getElementById('b12-bo').textContent=B.toLocaleString();
  const chosen=B12_SCENARIOS[sc];
  const res=simScenario(chosen,B);
  document.getElementById('b12-gdp').textContent=(res.gdp[4]/1000).toFixed(2)+'k';
  document.getElementById('b12-gr').textContent=res.gr+'%';
  document.getElementById('b12-nj').textContent=(res.nj>0?'+':'')+res.nj+'k';
  document.getElementById('b12-sc-val').textContent=res.score;
  document.getElementById('b12-sc-val').style.color=res.score>0.6?'#3fb950':res.score>0.4?'#e3b341':'#f78166';
  document.getElementById('b12-cr').textContent=res.cr;
  document.getElementById('b12-cr').style.color=res.cr>0.4?'#f78166':res.cr>0.25?'#e3b341':'#3fb950';
  document.getElementById('b12-inc').textContent=res.inc;

  const allRes=B12_SCENARIOS.map(s=>simScenario(s,B));
  mkChart('b12-score-chart',{type:'bar',data:{labels:B12_SCENARIOS.map(s=>s.name.substring(0,18)),datasets:[{data:allRes.map(r=>r.score),backgroundColor:B12_SCENARIOS.map((s,i)=>i===sc?s.color:s.color+'88')}]},options:{...CHART_DEFAULTS,plugins:{legend:{display:false}}}});

  const years=[2026,2027,2028,2029,2030];
  mkChart('b12-gdp-chart',{type:'line',data:{labels:years,datasets:B12_SCENARIOS.map((s,i)=>({label:s.name,data:allRes[i].gdp.map(v=>+(v/1000).toFixed(1)),borderColor:s.color,borderWidth:i===sc?3:1,pointRadius:i===sc?4:2,tension:.3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#8b949e',font:{size:9},boxWidth:12}}},scales:{x:{grid:{color:'#21262d'},ticks:{color:'#6e7681',font:{size:9}}},y:{grid:{color:'#21262d'},ticks:{color:'#6e7681',font:{size:9}},title:{display:true,text:'GDP (ng.tỷ)',color:'#6e7681',font:{size:9}}}}}});

  const risks=['Cyber Risk','Phát thải','Thiếu bao trùm','Lao động','Tăng trưởng thấp'];
  const rvals=[Math.max(0,res.cr),Math.max(0,res.emis),Math.max(0,1-res.inc),res.nj<0?0.8:0.1,Math.max(0,(8-res.gr)/8)];
  mkChart('b12-risk-chart',{type:'radar',data:{labels:risks,datasets:[{label:chosen.name,data:rvals,backgroundColor:chosen.color+'33',borderColor:chosen.color,borderWidth:2,pointBackgroundColor:chosen.color}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{backgroundColor:'#161b22',grid:{color:'#30363d'},pointLabels:{color:'#8b949e',font:{size:9}},ticks:{display:false},min:0,max:1}}}});

  const alertEl=document.getElementById('b12-risk-alerts');
  if(alertEl){
    let html='';
    if(res.cr>0.4)html+=`<div class="err-box">🔴 Rủi ro an ninh số cao: ${res.cr} > 0.4 — AI cao nhưng nhân lực bảo mật chưa đủ</div>`;
    else if(res.cr>0.25)html+=`<div class="warn-box">🟡 An ninh số cần theo dõi: ${res.cr}</div>`;
    else html+=`<div class="success-box">✅ An ninh số: ${res.cr} — kiểm soát tốt</div>`;
    if(res.emis>0.5)html+=`<div class="err-box">🔴 Phát thải cao: ${res.emis} — có thể vi phạm cam kết COP26</div>`;
    else if(res.emis>0.35)html+=`<div class="warn-box">🟡 Phát thải trung bình: ${res.emis}</div>`;
    else html+=`<div class="success-box">✅ Phát thải thấp: ${res.emis} — phù hợp Net-zero 2050</div>`;
    if(res.inc<0.25)html+=`<div class="err-box">🔴 Bao trùm số thấp: ${res.inc} — nguy cơ khoảng cách số gia tăng</div>`;
    else html+=`<div class="success-box">✅ Bao trùm: ${res.inc}</div>`;
    alertEl.innerHTML=html;
  }
}

function updateB6(){
  const wai=parseInt(document.getElementById('b6-wai')?.value||20)/100;
  const wd=parseInt(document.getElementById('b6-wd')?.value||15)/100;
  document.getElementById('b6-wai-out').textContent=wai.toFixed(2);
  document.getElementById('b6-wd-out').textContent=wd.toFixed(2);
  const aiR=[22,68,40,18,75,30];
  const dig=[38,78,55,32,82,48];
  const grdp=[57,152.3,87.5,68.9,158.9,80.5];
  const names=['TDMNPB','ĐBSH','BTBDHMT','TN','ĐNB','ĐBSCL'];
  const norm=(arr)=>{const mn=Math.min(...arr),mx=Math.max(...arr);return arr.map(v=>(v-mn)/(mx-mn||1));};
  const na=norm(aiR),nd=norm(dig),ng=norm(grdp);
  const scores=names.map((_,i)=>+(wai*na[i]+wd*nd[i]+(1-wai-wd)*.3*ng[i]+.1*na[i]).toFixed(4));
  const sorted=names.map((n,i)=>({n,v:scores[i]})).sort((a,b)=>b.v-a.v);
  const el=document.getElementById('b6-bars');
  if(el)el.innerHTML=sorted.map((x,i)=>`<div class="rank-bar"><div class="rank-label">${x.n}</div><div class="rank-fill" style="width:${(x.v/sorted[0].v*100).toFixed(0)}%;background:${i<2?'#f78166':'#58a6ff'}"></div><div class="rank-score">${x.v.toFixed(4)}</div></div>`).join('');
  const cats=['GRDP/người','FDI','Digital','AI Ready','LĐ ĐT','R&D','Internet'];
  const regData=[[57,3.5,38,22,21.5,.18,72],[152,20,78,68,36.8,.85,92],[87,8.2,55,40,27.5,.32,84],[68,.8,32,18,18.2,.15,68],[158,18.5,82,75,42.5,.78,94],[80,2.1,48,30,16.8,.22,78]];
  const nm=(arr)=>{const mn=Math.min(...arr),mx=Math.max(...arr);return arr.map(v=>(v-mn)/(mx-mn||1));};
  const normed=cats.map((_,ci)=>nm(regData.map(r=>r[ci])));
  const hexes=['#58a6ff','#3fb950','#e3b341','#f78166','#d2a8ff','#79c0ff'];
  mkChart('b6-chart',{type:'radar',data:{labels:cats,datasets:names.map((n,i)=>({label:n,data:cats.map((_,ci)=>+normed[ci][i].toFixed(2)),borderColor:hexes[i],backgroundColor:hexes[i]+'22',borderWidth:1.5,pointRadius:2}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#8b949e',font:{size:8},boxWidth:10}}},scales:{r:{backgroundColor:'#161b22',grid:{color:'#30363d'},pointLabels:{color:'#8b949e',font:{size:8}},ticks:{display:false},min:0,max:1}}}});
}
